<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1 Vocabulary Game: PET Test 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations for smooth interactions */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
            40%, 60% { transform: translate3d(3px, 0, 0); }
        }
        /* Custom scrollbar for word bank to keep it neat */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen pb-10">

    <!-- Header -->
    <header class="bg-indigo-600 text-white py-6 shadow-md">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-2xl md:text-3xl font-bold flex items-center gap-2">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                B1 Vocabulary Challenge
            </h1>
            <p class="mt-2 text-indigo-100">Click a word in the bank, then click an empty blank to place it. Fill in all 20 sentences!</p>
        </div>
    </header>

    <!-- Grid Layout Container -->
    <main class="max-w-7xl mx-auto px-4 mt-6 grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
        
        <!-- Sticky Word Bank (Left Column - 1/3 width on large screens) -->
        <div class="lg:col-span-4 sticky top-6 z-20 bg-white rounded-xl shadow-lg border border-slate-200 p-5 transition-all">
            <div class="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                <h2 class="text-xl font-bold text-slate-700">Word Bank</h2>
                <span id="progress-text" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full tracking-wide">0 / 20 Placed</span>
            </div>
            <div id="word-bank" class="flex flex-wrap gap-2 max-h-56 lg:max-h-[calc(100vh-14rem)] overflow-y-auto p-1 pb-4 custom-scrollbar">
                <!-- Words will be injected here by JS -->
            </div>
        </div>

        <!-- Sentences Container (Right Column - 2/3 width on large screens) -->
        <div class="lg:col-span-8 flex flex-col gap-6">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 md:p-8">
                <div id="sentences-container" class="space-y-6">
                    <!-- Sentences will be injected here by JS -->
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-4 justify-end mb-8">
                <button onclick="resetGame()" class="px-6 py-3 rounded-lg font-semibold text-slate-600 bg-slate-200 hover:bg-slate-300 transition-colors">
                    Reset Game
                </button>
                <button onclick="checkAnswers()" class="px-8 py-3 rounded-lg font-semibold text-white bg-green-500 hover:bg-green-600 shadow-md shadow-green-500/30 transition-colors transform hover:-translate-y-0.5">
                    Check Answers
                </button>
            </div>
        </div>

    </main>

    <!-- Results Modal -->
    <div id="result-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 hidden flex items-center justify-center fade-in">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 text-center transform scale-100 transition-transform">
            <div id="modal-icon" class="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4 text-4xl">
                <!-- Icon injected by JS -->
            </div>
            <h3 id="modal-title" class="text-2xl font-bold text-slate-800 mb-2">Results</h3>
            <p id="modal-message" class="text-slate-600 mb-6 text-lg"></p>
            <button onclick="closeModal()" class="w-full px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors">
                Continue
            </button>
        </div>
    </div>

    <script>
        // Data Structure
        const rawWords = [
            "admission", "complex", "concentrate", "culture", "deposit", 
            "depressed", "effect", "exhausted", "graduate", "illegal", 
            "ordinary", "reduction", "relationship", "retired", "scientist", 
            "solve", "struggle", "translate", "unexpected", "warning"
        ];

        // Sort words alphabetically for the word bank
        const words = [...rawWords].sort();

        const sentencesData = [
            { id: 0, parts: ["The museum offers free ", " for children under 12 years old."], answer: "admission" },
            { id: 1, parts: ["After a long flight back to Ho Chi Minh City, I felt completely ", " and just wanted to sleep."], answer: "exhausted" },
            { id: 2, parts: ["We need to ", " this document from English into Vietnamese before the meeting tomorrow."], answer: "translate" },
            { id: 3, parts: ["She paid a 10% ", " to the landlord to reserve the apartment."], answer: "deposit" },
            { id: 4, parts: ["The police officer gave him a ", " for driving too fast, but didn't fine him."], answer: "warning" },
            { id: 5, parts: ["It is completely ", " to drive a motorbike without a helmet."], answer: "illegal" },
            { id: 6, parts: ["The new software is very ", ", so it might take a few days to understand how to use it properly."], answer: "complex" },
            { id: 7, parts: ["Many students ", " with English grammar, especially when learning the past tense."], answer: "struggle" },
            { id: 8, parts: ["He hopes to ", " from university next year with a degree in computer science."], answer: "graduate" },
            { id: 9, parts: ["My grandfather is ", " now, so he has plenty of free time to travel and relax."], answer: "retired" },
            { id: 10, parts: ["The supermarket announced a massive ", " in the price of fresh fruit for the weekend."], answer: "reduction" },
            { id: 11, parts: ["Marie Curie was a brilliant ", " who won two Nobel Prizes for her work."], answer: "scientist" },
            { id: 12, parts: ["It was just an ", " Tuesday until I received a surprise package in the mail."], answer: "ordinary" },
            { id: 13, parts: ["The heavy rain this morning was totally ", "; the weather forecast had predicted clear skies!"], answer: "unexpected" },
            { id: 14, parts: ["I can't ", " on my coding project when the television is so loud."], answer: "concentrate" },
            { id: 15, parts: ["He felt very ", " and hopeless after he failed his final exams."], answer: "depressed" },
            { id: 16, parts: ["The two brothers have a great ", " and support each other through everything."], answer: "relationship" },
            { id: 17, parts: ["Trying local street food is one of the best ways to understand a country's ", "."], answer: "culture" },
            { id: 18, parts: ["It took the detective three years to finally ", " the mystery of the missing painting."], answer: "solve" },
            { id: 19, parts: ["Drinking too much coffee late at night can have a negative ", " on your sleep schedule."], answer: "effect" }
        ];

        // State variables
        let selectedWord = null;
        let placements = new Array(sentencesData.length).fill(null); // stores words placed in slots
        let checked = false; // flag to know if we've checked answers
        let correctStatuses = new Array(sentencesData.length).fill(null); // true, false, or null

        // DOM Elements
        const wordBankEl = document.getElementById('word-bank');
        const sentencesEl = document.getElementById('sentences-container');
        const progressEl = document.getElementById('progress-text');
        const modalEl = document.getElementById('result-modal');

        // Initialize Game
        function init() {
            renderWordBank();
            renderSentences();
            updateProgress();
        }

        // Render Word Bank
        function renderWordBank() {
            wordBankEl.innerHTML = '';
            
            words.forEach(word => {
                // Check if word is already placed in a sentence
                const isPlaced = placements.includes(word);
                
                if (isPlaced) return; // Hide placed words from the bank

                const isSelected = selectedWord === word;
                
                const btn = document.createElement('button');
                btn.innerText = word;
                
                // Styling classes based on selection state
                let baseClasses = "px-4 py-2 rounded-lg font-medium transition-all duration-200 border-2 select-none ";
                if (isSelected) {
                    baseClasses += "bg-indigo-600 text-white border-indigo-600 shadow-md transform scale-105";
                } else {
                    baseClasses += "bg-white text-indigo-700 border-indigo-200 hover:border-indigo-400 hover:bg-indigo-50 active:scale-95";
                }
                
                btn.className = baseClasses;
                btn.onclick = () => selectWord(word);
                
                wordBankEl.appendChild(btn);
            });

            // If all words are placed, show a message
            if (words.every(w => placements.includes(w))) {
                wordBankEl.innerHTML = '<div class="w-full text-center text-slate-400 py-8 italic">All words placed! Ready to check your answers.</div>';
            }
        }

        // Render Sentences
        function renderSentences() {
            sentencesEl.innerHTML = '';
            
            sentencesData.forEach((sentence, index) => {
                const placedWord = placements[index];
                const status = correctStatuses[index]; // null, true, false
                
                const container = document.createElement('div');
                // Removed flexbox to allow natural inline text wrapping without breaking words unnecessarily
                container.className = "text-base leading-relaxed pb-3 border-b border-slate-100 last:border-0 last:pb-0";
                
                // Number label
                const numberSpan = document.createElement('span');
                numberSpan.className = "font-bold text-slate-400 mr-2 inline-block w-6 text-right";
                numberSpan.innerText = `${index + 1}.`;
                container.appendChild(numberSpan);

                // First part of sentence
                const part1 = document.createElement('span');
                part1.innerText = sentence.parts[0];
                container.appendChild(part1);

                // Interactive Blank Space
                const blankBtn = document.createElement('button');
                blankBtn.id = `blank-${index}`;
                
                if (placedWord) {
                    blankBtn.innerText = placedWord;
                    
                    // Styling for filled blanks depending on check status
                    if (status === true) {
                        // Correct answer (locked)
                        blankBtn.className = "px-3 py-0.5 mx-0.5 align-baseline font-semibold rounded bg-green-100 text-green-800 border-2 border-green-500 cursor-default shadow-sm transition-all fade-in";
                        // Can't interact with correct ones anymore
                    } else if (status === false) {
                        // Incorrect answer
                        blankBtn.className = "px-3 py-0.5 mx-0.5 align-baseline font-semibold rounded bg-red-100 text-red-800 border-2 border-red-500 cursor-pointer hover:bg-red-200 shadow-sm transition-all fade-in shake";
                        blankBtn.onclick = () => returnWord(index);
                    } else {
                        // Unchecked filled answer
                        blankBtn.className = "px-3 py-0.5 mx-0.5 align-baseline font-semibold rounded bg-indigo-100 text-indigo-800 border-2 border-indigo-400 cursor-pointer hover:bg-indigo-200 shadow-sm transition-all fade-in";
                        blankBtn.onclick = () => returnWord(index);
                    }
                } else {
                    // Empty blank styling
                    blankBtn.innerHTML = "&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;";
                    
                    let emptyClass = "px-4 py-0.5 mx-0.5 align-baseline rounded border-2 border-dashed transition-all duration-200 ";
                    if (selectedWord) {
                        emptyClass += "border-indigo-400 bg-indigo-50/50 cursor-pointer hover:bg-indigo-100 animate-pulse";
                    } else {
                        emptyClass += "border-slate-300 bg-slate-50 cursor-pointer hover:border-slate-400";
                    }
                    
                    blankBtn.className = emptyClass;
                    blankBtn.onclick = () => placeWord(index);
                }
                
                container.appendChild(blankBtn);

                // Second part of sentence
                const part2 = document.createElement('span');
                part2.innerText = sentence.parts[1];
                container.appendChild(part2);

                sentencesEl.appendChild(container);
            });
        }

        // Logic: Select a word from the bank
        function selectWord(word) {
            // Toggle selection
            if (selectedWord === word) {
                selectedWord = null;
            } else {
                selectedWord = word;
            }
            // Reset checking status if user starts interacting again
            if(checked) resetFeedbackUI();
            
            renderWordBank();
            renderSentences(); // Re-render to show pulsing blanks
        }

        // Logic: Place selected word into a blank
        function placeWord(sentenceIndex) {
            if (!selectedWord) {
                // If clicked an empty blank without selecting a word, gently remind
                const blank = document.getElementById(`blank-${sentenceIndex}`);
                blank.classList.add('shake', 'border-red-300', 'bg-red-50');
                setTimeout(() => {
                    blank.classList.remove('shake', 'border-red-300', 'bg-red-50');
                }, 400);
                return;
            }

            // Place word
            placements[sentenceIndex] = selectedWord;
            selectedWord = null;
            
            if(checked) resetFeedbackUI();
            
            updateProgress();
            renderWordBank();
            renderSentences();
        }

        // Logic: Return a placed word back to the bank
        function returnWord(sentenceIndex) {
            // Cannot return if already marked correct
            if (correctStatuses[sentenceIndex] === true) return;
            
            placements[sentenceIndex] = null;
            
            if(checked) resetFeedbackUI();
            
            updateProgress();
            renderWordBank();
            renderSentences();
        }

        // Reset check statuses when user makes changes
        function resetFeedbackUI() {
            checked = false;
            correctStatuses = new Array(sentencesData.length).fill(null);
        }

        // Update top counter
        function updateProgress() {
            const placedCount = placements.filter(p => p !== null).length;
            progressEl.innerText = `${placedCount} / ${sentencesData.length} Placed`;
            
            if (placedCount === sentencesData.length) {
                progressEl.classList.remove('bg-indigo-50', 'text-indigo-600');
                progressEl.classList.add('bg-green-100', 'text-green-700', 'font-bold');
                progressEl.innerText = "All Placed! Ready to Check";
            } else {
                progressEl.classList.add('bg-indigo-50', 'text-indigo-600');
                progressEl.classList.remove('bg-green-100', 'text-green-700', 'font-bold');
            }
        }

        // Check Answers Logic
        function checkAnswers() {
            const placedCount = placements.filter(p => p !== null).length;
            if (placedCount === 0) {
                showModal("Wait a minute!", "You need to place at least one word before checking.", "🤔", "bg-amber-100", "text-amber-600");
                return;
            }

            checked = true;
            let score = 0;

            placements.forEach((word, index) => {
                if (word === null) {
                    correctStatuses[index] = null;
                } else if (word === sentencesData[index].answer) {
                    correctStatuses[index] = true;
                    score++;
                } else {
                    correctStatuses[index] = false;
                }
            });

            renderSentences(); // Re-render to show green/red styling

            // Build feedback modal content
            if (score === sentencesData.length) {
                showModal("Perfect Score!", "Excellent work! You've mastered all 20 B1 vocabulary words.", "🏆", "bg-green-100", "text-green-600");
            } else if (score >= 15) {
                showModal("Great Job!", `You got ${score} out of 20 correct. Just a few to fix!`, "⭐", "bg-blue-100", "text-blue-600");
            } else {
                showModal("Keep Trying!", `You got ${score} out of 20 correct. Click the red words to send them back and try again.`, "💪", "bg-indigo-100", "text-indigo-600");
            }
        }

        // Reset the entire game
        function resetGame() {
            if(confirm("Are you sure you want to reset all your answers?")) {
                placements.fill(null);
                correctStatuses.fill(null);
                selectedWord = null;
                checked = false;
                updateProgress();
                renderWordBank();
                renderSentences();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Modal Logic
        function showModal(title, message, emoji, iconBgColor, iconTextColor) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            
            const iconEl = document.getElementById('modal-icon');
            iconEl.innerText = emoji;
            // Reset classes and apply new colors
            iconEl.className = `w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4 text-4xl ${iconBgColor} ${iconTextColor}`;
            
            modalEl.classList.remove('hidden');
        }

        function closeModal() {
            modalEl.classList.add('hidden');
        }

        // Start the game on load
        window.onload = init;

    </script>
</body>
</html>
